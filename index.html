<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Saaiya</title>
<link rel="icon" href="avatar.png" />
<style>
  :root {
    --text: #4a4654;
    --muted: #9b96a8;
    --card: rgba(255, 255, 255, 0.72);
    --card-hover: #ffffff;
    --border: rgba(255, 255, 255, 0.9);
    --ring: #ffd6ec;
    --accent: #6fd0c4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Sans", "Noto Sans JP",
      -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 20px;
    -webkit-font-smoothing: antialiased;
    background: linear-gradient(160deg, #fef6fb 0%, #f0f9ff 45%, #f3fdf7 100%);
    overflow-x: hidden;
  }

  /* ふわふわ背景の玉 */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.5;
    z-index: 0;
    animation: float 9s ease-in-out infinite;
  }
  .blob.a { width: 260px; height: 260px; background: #ffd6ec; top: -60px; left: -60px; }
  .blob.b { width: 300px; height: 300px; background: #c8f0e8; bottom: -80px; right: -70px; animation-delay: -3s; }
  .blob.c { width: 200px; height: 200px; background: #d6e8ff; top: 40%; right: -40px; animation-delay: -5s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-22px) scale(1.06); }
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    text-align: center;
  }

  .avatar {
    width: 116px;
    height: 116px;
    border-radius: 50%;
    margin: 0 auto 16px;
    object-fit: cover;
    background: #fff;
    border: 4px solid #fff;
    box-shadow: 0 0 0 5px var(--ring), 0 10px 30px rgba(255, 150, 200, 0.3);
    animation: bob 4s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-7px) rotate(1deg); }
  }

  h1 {
    font-size: 25px;
    font-weight: 800;
    letter-spacing: 0.5px;
  }
  h1 .spark { font-size: 18px; }

  .bio {
    color: var(--muted);
    font-size: 13.5px;
    margin: 8px 0 30px;
    line-height: 1.7;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 13px;
  }

  .link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 20px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
    backdrop-filter: blur(6px);
    box-shadow: 0 6px 18px rgba(150, 140, 180, 0.12);
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s ease, background 0.18s ease;
  }

  .link:hover {
    background: var(--card-hover);
    transform: translateY(-3px) scale(1.015);
    box-shadow: 0 12px 26px rgba(150, 140, 180, 0.22);
  }
  .link:active { transform: translateY(-1px) scale(0.99); }

  .ic {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .ic svg { width: 21px; height: 21px; }

  .ic.motto  { background: #d9f6f0; }
  .ic.note   { background: #e3faf0; }
  .ic.x      { background: #eceef2; }
  .ic.yt     { background: #ffe1e1; }
  .ic.meguri { background: #ffe6f3; }

  .label { flex: 1; text-align: left; line-height: 1.3; }
  .label small {
    display: block;
    color: var(--muted);
    font-weight: 500;
    font-size: 11.5px;
    margin-top: 1px;
  }

  .chev { color: var(--ring); font-size: 16px; font-weight: 800; }

  footer {
    margin-top: 34px;
    color: var(--muted);
    font-size: 11.5px;
  }
</style>
</head>
<body>
  <div class="blob a"></div>
  <div class="blob b"></div>
  <div class="blob c"></div>

  <main class="wrap">
    <img class="avatar" src="avatar.png" alt="Saaiya" />
    <h1><span class="spark">✦</span> Saaiya <span class="spark">✦</span></h1>
    <p class="bio">ご当地情報交換アプリ「motto」をひとりで作ってます ⸜(๑'ᵕ'๑)⸝</p>

    <nav class="links">
      <a class="link" href="https://motto.yasashii-sek.ai" target="_blank" rel="noopener noreferrer">
        <span class="ic motto"><svg viewBox="0 0 24 24" fill="none" stroke="#2bb3a3" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.4"/></svg></span>
        <span class="label">motto<small>ご当地情報交換アプリ</small></span>
        <span class="chev">›</span>
      </a>

      <a class="link" href="https://note.com/saaiya" target="_blank" rel="noopener noreferrer">
        <span class="ic note"><svg viewBox="0 0 24 24" fill="#41c9a0"><path d="M4 3h16a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zm3 5v8h2.2v-4.6L12.8 16H15V8h-2.2v4.6L9.2 8z"/></svg></span>
        <span class="label">note<small>ミッションを綴る</small></span>
        <span class="chev">›</span>
      </a>

      <a class="link" href="https://x.com/motto_jp" target="_blank" rel="noopener noreferrer">
        <span class="ic x"><svg viewBox="0 0 24 24" fill="#3b3b46"><path d="M18.9 2H22l-7 8 8.2 12h-6.4l-5-7.3L9 22H6l7.5-8.6L5.5 2H12l4.5 6.6zm-1.1 18h1.7L8.3 3.8H6.5z"/></svg></span>
        <span class="label">X<small>motto 広報</small></span>
        <span class="chev">›</span>
      </a>

      <a class="link" href="https://www.youtube.com/channel/UCUYUVN5zZRku8NX5pQ5CFKw/" target="_blank" rel="noopener noreferrer">
        <span class="ic yt"><svg viewBox="0 0 24 24" fill="#ff5757"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.6 15.6V8.4l6.2 3.6z"/></svg></span>
        <span class="label">YouTube<small>動画</small></span>
        <span class="chev">›</span>
      </a>

      <a class="link" href="https://saaiya-chan.github.io/Meguri/" target="_blank" rel="noopener noreferrer">
        <span class="ic meguri"><svg viewBox="0 0 24 24" fill="none" stroke="#f06bb0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.4"/></svg></span>
        <span class="label">Meguri<small>めぐり</small></span>
        <span class="chev">›</span>
      </a>
    </nav>

    <footer>♡ 2026 Saaiya</footer>
  </main>
</body>
</html>
